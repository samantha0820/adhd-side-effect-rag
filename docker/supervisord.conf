[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:rag-api]
command=/usr/local/bin/uvicorn src.side_effect.rag.api:app --host 127.0.0.1 --port 8000
directory=/app
environment=RAG_INDEX_DIR="/app/artifacts/rag",RAG_ALLOWED_ORIGINS="*",TOKENIZERS_PARALLELISM="false"
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nextjs]
command=/usr/local/bin/node /app/frontend/server.js
directory=/app/frontend
environment=NODE_ENV="production",HOSTNAME="127.0.0.1",PORT="3000",RAG_API_URL="http://127.0.0.1:8000"
autostart=true
autorestart=true
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -c /app/docker/nginx.conf -g "daemon off;"
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
