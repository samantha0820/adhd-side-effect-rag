steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull us-central1-docker.pkg.dev/side-effect-rag/side-effect-rag/app:redesign-v1 || true
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from=us-central1-docker.pkg.dev/side-effect-rag/side-effect-rag/app:redesign-v1
      - --tag=us-central1-docker.pkg.dev/side-effect-rag/side-effect-rag/app:redesign-v2
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/side-effect-rag/side-effect-rag/app:redesign-v2
timeout: 3600s
